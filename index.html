<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scentzy Aromas</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-900">

<!-- NAVBAR -->
<nav class="bg-[#800000] text-white p-4 flex justify-between items-center flex-wrap">

  <h1 class="text-2xl font-bold">Scentzy Aromas</h1>

  <input id="search" onkeyup="searchProducts()"
    placeholder="Search perfume..."
    class="text-black px-3 py-1 rounded w-1/3" />

  <select onchange="filterCategory(this.value)"
    class="text-black px-2 py-1 rounded">

    <option value="all">All</option>
    <option value="men">Men</option>
    <option value="women">Women</option>
    <option value="unisex">Unisex</option>
    <option value="attar">Attar</option>

  </select>

  <button onclick="viewCart()" class="bg-white text-[#800000] px-3 py-1 rounded">
    Cart (<span id="cart-count">0</span>)
  </button>

</nav>

<!-- PRODUCTS -->
<div id="product-list" class="grid grid-cols-2 gap-6 p-6"></div>

<!-- MODAL -->
<div id="productModal" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-60">
  <div class="bg-white p-6 m-6 rounded-xl">

    <img id="modal-img" class="w-full h-48 object-contain" />
    <h2 id="modal-name" class="text-xl font-bold mt-2"></h2>
    <p id="modal-price" class="text-[#800000]"></p>
    <p id="modal-desc" class="mt-2 text-sm"></p>

    <input id="qty" type="number" value="1" min="1" class="border p-1 w-20 mt-2"/>

    <button onclick="addToCartFromModal()" class="bg-[#800000] text-white px-3 py-1 mt-3 rounded">
      Add to Cart
    </button>

    <button onclick="closeModal()" class="ml-2 px-3 py-1 border">Close</button>

  </div>
</div>

<!-- CART -->
<div id="cart" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-60">
  <div class="bg-white p-6 m-6 rounded-xl">

    <h2 class="text-xl font-bold mb-4">Your Cart</h2>
    <div id="cart-items"></div>

    <h3 id="total" class="mt-4 text-[#800000] font-bold"></h3>

    <button onclick="orderNow()" class="bg-green-500 text-white px-4 py-2 mt-4 rounded">
      Order on WhatsApp
    </button>

    <button onclick="closeCart()" class="ml-2 px-4 py-2 border">
      Close
    </button>

  </div>
</div>

<script>

const phoneNumber = "919395739352";

let selectedProduct = null;
let cart = [];
let filteredProducts = [];

/* ================= PRODUCTS ================= */

const products = [

/* ===== MEN ===== */
{id:1,name:"Rasasi Hawas",price:2900,image:"hawas.jpg",category:"men",desc:"Fresh aquatic fragrance"},
{id:2,name:"Afnan 9PM",price:2900,image:"9pm.jpg",category:"men",desc:"Sweet night fragrance"},
{id:3,name:"Armaf Odyssey Mega",price:2350,image:"odyssey.jpg",category:"men",desc:"Fresh citrus scent"},
{id:4,name:"Armaf CDN Intense Man",price:4200,image:"cdnintense.jpg",category:"men",desc:"Smoky citrus beast mode fragrance"},
{id:5,name:"Armaf CDN Intense Man Pure Parfum",price:5100,image:"cdnintense.jpg",category:"men",desc:"Ultra strong long lasting parfum version"},
{id:6,name:"Afnan 9PM Elixir",price:3199,image:"9pme.jpg",category:"men",desc:"Deeper sweeter version of 9PM"},

/* ===== WOMEN ===== */
{id:7,name:"Lattafa Yara Elixir",price:2399,image:"yara.jpg",category:"women",desc:"Sweet feminine fragrance"},
{id:8,name:"Ajmal Raindrops",price:1499,image:"raindrops.jpg",category:"women",desc:"Soft floral fragrance"},
{id:9,name:"Armaf Tag Her",price:2389,image:"tagher.jpg",category:"women",desc:"Modern sweet fragrance"},
{id:10,name:"Lattafa Atheeri",price:3399,image:"atheeri.jpg",category:"women",desc:"Luxury floral scent"},

/* ===== UNISEX ===== */
{id:11,name:"Lattafa Najdia",price:1699,image:"najdia.jpg",category:"unisex",desc:"Fresh spicy fragrance"},
{id:12,name:"Maison Alhambra Kismet Magic",price:2499,image:"kismet.jpg",category:"unisex",desc:"Sweet warm fragrance"},
{id:13,name:"Ahmed Al Maghribi Bin Shaikh",price:5200,image:"binshaikh.jpg",category:"unisex",desc:"Luxury oud fragrance"},
{id:14,name:"Ahmed Al Maghribi Oud & Roses",price:3699,image:"oudroses.jpg",category:"unisex",desc:"Rose + oud premium fragrance"},

/* ===== ATTAR ===== */
{id:15,name:"Afnan Musk Abiyad",price:1399,image:"musk.jpg",category:"attar",desc:"Clean white musk attar"},
{id:16,name:"Ajmal Jannatul Firdaus",price:699,image:"jannat.jpg",category:"attar",desc:"Classic green attar"},
{id:17,name:"Al Haramain Madinah",price:899,image:"madinah.jpg",category:"attar",desc:"Soft spiritual attar"},
{id:18,name:"Zimaya Sharaf",price:1850,image:"sharaf.jpg",category:"attar",desc:"Rich oriental attar"}

];

filteredProducts = products;

/* ================= RENDER ================= */

function renderProducts(){
  const list = document.getElementById("product-list");
  list.innerHTML = "";

  filteredProducts.forEach(p=>{
    list.innerHTML += `
      <div onclick="openModal(${p.id})" class="border rounded-xl shadow cursor-pointer">

        <img src="${p.image}" class="h-48 w-full object-contain"/>

        <div class="p-2">
          <h2 class="font-semibold">${p.name}</h2>
          <p class="text-[#800000]">₹${p.price}</p>
        </div>

      </div>
    `;
  });
}

renderProducts();

/* ================= FILTER ================= */

function filterCategory(type){
  if(type==="all"){
    filteredProducts = products;
  } else {
    filteredProducts = products.filter(p => p.category === type);
  }
  renderProducts();
}

/* ================= SEARCH ================= */

function searchProducts(){
  let q = document.getElementById("search").value.toLowerCase();
  filteredProducts = products.filter(p =>
    p.name.toLowerCase().includes(q)
  );
  renderProducts();
}

/* ================= MODAL ================= */

function openModal(id){
  selectedProduct = products.find(p=>p.id===id);

  document.getElementById("modal-img").src = selectedProduct.image;
  document.getElementById("modal-name").innerText = selectedProduct.name;
  document.getElementById("modal-price").innerText = "₹"+selectedProduct.price;
  document.getElementById("modal-desc").innerText = selectedProduct.desc;

  document.getElementById("productModal").classList.remove("hidden");
}

function closeModal(){
  document.getElementById("productModal").classList.add("hidden");
}

/* ================= CART ================= */

function addToCartFromModal(){

  let qty = parseInt(document.getElementById("qty").value);

  let item = cart.find(i=>i.id===selectedProduct.id);

  if(item) item.qty += qty;
  else cart.push({...selectedProduct, qty});

  updateCartCount();
  closeModal();
}

function updateCartCount(){
  let count = 0;
  cart.forEach(i=>count += i.qty);
  document.getElementById("cart-count").innerText = count;
}

/* ================= CART VIEW ================= */

function viewCart(){
  document.getElementById("cart").classList.remove("hidden");

  let box = document.getElementById("cart-items");
  box.innerHTML = "";

  let total = 0;

  cart.forEach(i=>{
    total += i.price*i.qty;

    box.innerHTML += `
      <p>${i.name} x${i.qty} = ₹${i.price*i.qty}</p>
    `;
  });

  document.getElementById("total").innerText = "Total: ₹"+total;
}

/* ================= ORDER ================= */

function orderNow(){

  let msg = "Order:%0A";
  let total = 0;

  cart.forEach(i=>{
    msg += `${i.name} x${i.qty}%0A`;
    total += i.price*i.qty;
  });

  msg += "Total: "+total;

  window.open(`https://wa.me/${phoneNumber}?text=${msg}`);
}

</script>

</body>
</html>
