<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scentzy Aromas</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-900">

<!-- NAVBAR -->
<nav class="bg-[#800000] text-white p-4 flex justify-between items-center flex-wrap">

  <div class="flex items-center gap-2">
    <img src="logo.jpg" class="w-10 h-10 rounded-full border-2 border-white">
    <h1 class="text-xl font-bold">Scentzy Aromas</h1>
  </div>

  <select onchange="filterCategory(this.value)" class="text-black px-2 py-1 rounded">
    <option value="all">All</option>
    <option value="men">Men</option>
    <option value="women">Women</option>
    <option value="attar">Attar</option>
  </select>

  <button onclick="viewCart()" class="bg-white text-[#800000] px-3 py-1 rounded">
    Cart (<span id="cart-count">0</span>)
  </button>

</nav>

<!-- PRODUCTS -->
<div id="product-list" class="grid grid-cols-2 gap-4 p-4"></div>

<!-- CART -->
<div id="cart" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-60">
  <div class="bg-white p-4 m-4 rounded">

    <h2 class="text-xl font-bold mb-2">Your Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total" class="mt-2 font-bold"></h3>

    <button onclick="orderNow()" class="bg-green-500 text-white px-3 py-1 mt-3 rounded">
      Buy Now (WhatsApp)
    </button>

    <button onclick="closeCart()" class="ml-2 border px-3 py-1 mt-3">
      Close
    </button>

  </div>
</div>

<script>

const phoneNumber = "919395739352";

let cart = [];
let filteredProducts = [];

const products = [

/* MEN */
{id:1,name:"Rasasi Hawas",price:2900,image:"hawas.jpg",category:"men"},
{id:2,name:"Afnan 9PM",price:2900,image:"9pm.jpg",category:"men"},
{id:3,name:"CDN Intense Man Pure Parfum",price:4200,image:"cdnpp.jpg",category:"men"},
{id:4,name:"Armaf Odyssey Mega",price:2350,image:"odyssey.jpg",category:"men"},
{id:5,name:"Afnan 9PM Elixir",price:3199,image:"9pme.jpg",category:"men"},
{id:6,name:"Lattafa Najdia",price:1699,image:"najdia.jpg",category:"men,women"},
{id:7,name:"Bin Shaikh",price:5200,image:"binshaikh.jpg",category:"men,women"},
{id:8,name:"Oud & Roses",price:3699,image:"oudroses.jpg",category:"men,women"},
{id:9,name:"Kaaf",price:2299,image:"kaaf.jpg",category:"men"},
{id:10,name:"Aqua Pura",price:850,image:"aquapura.jpg",category:"men"},
{id:11,name:"Ajmal Kuro",price:2399,image:"kuro.jpg",category:"men"},
{id:12,name:"Tres Nuit",price:1850,image:"tresnuit.jpg",category:"men"},
{id:13,name:"Blue Homme",price:1899,image:"bluehomme.jpg",category:"men"},
{id:14,name:"CDN Precieux",price:4499,image:"precieux.jpg",category:"men"},
{id:15,name:"Island Dreams",price:2399,image:"islanddreams.jpg",category:"men,women"},
{id:16,name:"Supremacy NOI",price:4199,image:"supremacynoi.jpg",category:"men"},
{id:17,name:"Supremacy Collector",price:4100,image:"supremacycollector.jpg",category:"men"},
{id:18,name:"Oud Al Layl",price:1499,image:"oudallayl.jpg",category:"men"},

/* WOMEN */
{id:19,name:"Yara Elixir",price:2399,image:"yara.jpg",category:"women"},
{id:20,name:"Najdia",price:1699,image:"najdia.jpg",category:"women"},
{id:21,name:"Island Dreams",price:2450,image:"islanddreams.jpg",category:"women"},
{id:22,name:"Lychee Fizz",price:799,image:"elysia.jpg",category:"women"},
{id:23,name:"Kismet Magic",price:2499,image:"kismet.jpg",category:"women"},
{id:24,name:"Raindrops",price:1499,image:"raindrops.jpg",category:"women"},
{id:25,name:"Wisal",price:2489,image:"wisal.jpg",category:"women"},
{id:26,name:"Tag Her",price:2389,image:"tagher.jpg",category:"women"},
{id:27,name:"Tres Jour",price:2389,image:"tresjour.jpg",category:"women"},
{id:28,name:"Atheeri",price:3399,image:"atheeri.jpg",category:"women"},
{id:29,name:"Shuhrah Femme",price:2699,image:"shuhrah.jpg",category:"women"},

/* ATTAR */
{id:30,name:"Musk Abiyad",price:1399,image:"musk.jpg",category:"attar"},
{id:31,name:"Jannatul Firdaus",price:699,image:"jannat.jpg",category:"attar"},
{id:32,name:"Madinah",price:899,image:"madinah.jpg",category:"attar"},
{id:33,name:"Sharaf",price:1850,image:"sharaf.jpg",category:"attar"}

];

filteredProducts = products;

/* RENDER */
function renderProducts(){
  let html = "";
  filteredProducts.forEach(p=>{
    html += `
      <div class="border p-2 rounded text-center">
        <img src="${p.image}" class="h-32 w-full object-contain mb-2">
        <h2 class="font-semibold">${p.name}</h2>
        <p class="text-[#800000]">₹${p.price}</p>
        <button onclick="addToCart(${p.id})" class="bg-[#800000] text-white px-2 mt-2 rounded">Add</button>
      </div>
    `;
  });
  document.getElementById("product-list").innerHTML = html;
}
renderProducts();

/* FILTER */
function filterCategory(type){
  if(type==="all") filteredProducts = products;
  else filteredProducts = products.filter(p=>p.category.includes(type));
  renderProducts();
}

/* CART */
function addToCart(id){
  let item = products.find(p=>p.id===id);
  cart.push(item);
  document.getElementById("cart-count").innerText = cart.length;
}

function viewCart(){
  document.getElementById("cart").classList.remove("hidden");

  let total = 0;
  let html = "";

  cart.forEach((item,i)=>{
    total += item.price;
    html += `${item.name} - ₹${item.price} 
    <button onclick="removeItem(${i})">❌</button><br>`;
  });

  document.getElementById("cart-items").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹"+total;
}

function removeItem(i){
  cart.splice(i,1);
  document.getElementById("cart-count").innerText = cart.length;
  viewCart();
}

function closeCart(){
  document.getElementById("cart").classList.add("hidden");
}

/* WHATSAPP ORDER */
function orderNow(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  let message = "Hello Scentzy Aromas,%0A I want to order:%0A";
  let total = 0;

  cart.forEach(item=>{
    message += `- ${item.name} (₹${item.price})%0A`;
    total += item.price;
  });

  message += `%0ATotal: ₹${total}%0A%0AName:%0AAddress:%0A`;

  window.open(`https://wa.me/${phoneNumber}?text=${message}`, "_blank");
}

</script>

</body>
</html>
