<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scentzy Aromas</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-900">

<!-- NAVBAR -->
<nav class="bg-[#800000] text-white p-4 flex justify-between items-center flex-wrap">
  <div class="flex items-center gap-2">
    <img src="logo.jpg" class="w-10 h-10 rounded-full border-2 border-white">
    <h1 class="text-xl font-bold">Scentzy Aromas</h1>
  </div>

  <select onchange="filterCategory(this.value)" class="text-black px-2 py-1 rounded">
    <option value="all">All</option>
    <option value="men">Men</option>
    <option value="women">Women</option>
    <option value="attar">Attar</option>
    <option value="budget">Budget Perfumes</option>
  </select>

  <button onclick="viewCart()" class="bg-white text-[#800000] px-3 py-1 rounded">
    Cart (<span id="cart-count">0</span>)
  </button>
</nav>

<!-- PRODUCTS -->
<div id="product-list" class="grid grid-cols-2 gap-4 p-4"></div>

<!-- MODAL -->
<div id="modal" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-60 flex items-center justify-center">
  <div class="bg-white p-4 rounded w-[90%]">

    <img id="m-img" class="w-full h-40 object-contain">
    <h2 id="m-name" class="text-lg font-bold mt-2"></h2>
    <p id="m-price" class="text-[#800000]"></p>
    <p id="m-desc" class="text-sm mt-1"></p>

    <label>Quantity:</label>
    <input id="m-qty" type="number" value="1" min="1" class="border w-16">

    <br><br>

    <button onclick="addFromModal()" class="bg-[#800000] text-white px-3 py-1 rounded">Add to Cart</button>
    <button onclick="buyNowModal()" class="bg-green-500 text-white px-3 py-1 rounded ml-2">Buy Now</button>
    <button onclick="closeModal()" class="ml-2 border px-3 py-1">Close</button>

  </div>
</div>

<!-- CART -->
<div id="cart" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-60">
  <div class="bg-white p-4 m-4 rounded">

    <h2 class="text-xl font-bold mb-2">Your Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total" class="mt-2 font-bold"></h3>

    <button onclick="orderNow()" class="bg-green-500 text-white px-3 py-1 mt-3 rounded">
      Buy Now (WhatsApp)
    </button>

    <button onclick="closeCart()" class="ml-2 border px-3 py-1 mt-3">
      Close
    </button>

  </div>
</div>

<script>

const phoneNumber = "919395739352";

let cart = [];
let filteredProducts = [];
let selectedProduct = null;

/* PRODUCTS */

const products = [

/* MEN */
{id:1,name:"RASASI HAWAS",price:2900,image:"hawas.jpg",category:["men"],desc:"Fresh aquatic long lasting fragrance"},
{id:2,name:"AFNAN 9PM",price:2900,image:"9pm.jpg",category:["men"],desc:"Sweet night party fragrance"},
{id:3,name:"ARMAF CLUB DE NUIT INTENSE MAN PURE PARFUM",price:4200,image:"cdnpp.jpg",category:["men"],desc:"Smoky citrus beast fragrance"},
{id:4,name:"ARMAF ODYSSEY MEGA",price:2350,image:"odyssey.jpg",category:["men"],desc:"Fresh citrus daily wear scent"},
{id:5,name:"AFNAN 9PM ELIXIR",price:3199,image:"9pme.jpg",category:["men"],desc:"Deeper sweeter version of 9PM"},
{id:6,name:"LATTAFA NAJDIA (UNISEX)",price:1699,image:"najdia.jpg",category:["men","women"],desc:"Fresh unisex fragrance"},
{id:7,name:"AHMED AL MAGHRIBI BIN SHAIKH",price:5200,image:"binshaikh.jpg",category:["men","women"],desc:"Luxury oud fragrance"},
{id:8,name:"AHMED AL MAGHRIBI OUD & ROSES (UNISEX)",price:3699,image:"oudroses.jpg",category:["men","women"],desc:"Rose oud blend"},
{id:9,name:"AHMED AL MAGHRIBI KAAF",price:2299,image:"kaaf.jpg",category:["men"],desc:"Clean aquatic fragrance"},
{id:10,name:"FRAGRANCE WORLD AQUA PURA 50ML",price:850,image:"aquapura.jpg",category:["men"],desc:"Fresh budget fragrance"},
{id:11,name:"AJMAL KURO",price:2399,image:"kuro.jpg",category:["men"],desc:"Spicy masculine fragrance"},
{id:12,name:"ARMAF TRES NUIT",price:1850,image:"tresnuit.jpg",category:["men"],desc:"Green fresh classy scent"},
{id:13,name:"ARMAF BLUE HOMME",price:1899,image:"bluehomme.jpg",category:["men"],desc:"Clean citrus daily wear fragrance"},

/* WOMEN */
{id:19,name:"LATTAFA YARA ELIXIR EDP",price:2399,image:"yara.jpg",category:["women"],desc:"Sweet creamy feminine scent"},
{id:25,name:"AJMAL WISAL 50ML EDP",price:2489,image:"wisal.jpg",category:["women"],desc:"Elegant floral fragrance"},

/* ATTAR */
{id:30,name:"AFNAN MUSK ABIYAD 20ML ATTAR",price:1399,image:"musk.jpg",category:["attar"],desc:"White musk attar"},
{id:33,name:"ZIMAYA SHARAF 20ML ATTAR",price:1850,image:"sharaf.jpg",category:["attar"],desc:"Rich oriental attar"},

/* BUDGET PERFUMES */
{id:34,name:"DELICIOUS DADDY",price:549,image:"delicious.jpg",category:["budget"],desc:"Sweet fruity, vanilla, cocoa, amber, musky seductive scent"},
{id:35,name:"PARADISE BABY",price:649,image:"paradise.jpg",category:["budget"],desc:"Mint, ginger, coconut, fig, sandalwood smooth unisex scent"},
{id:36,name:"FLORAL BABY",price:649,image:"floral.jpg",category:["budget"],desc:"Citrus, herbs, saffron spicy floral energetic fragrance"},
{id:37,name:"OUT OF IMAGINATION",price:849,image:"imagination.jpg",category:["budget"],desc:"Fresh citrus, ginger, black tea summer fragrance"}

];

filteredProducts = products;

/* RENDER */
function renderProducts(){
  let html = "";
  filteredProducts.forEach(p=>{
    html += `
      <div onclick="openModal(${p.id})" class="border p-2 rounded text-center cursor-pointer">
        <img src="${p.image}" class="h-32 w-full object-contain mb-2">
        <h2 class="font-semibold">${p.name}</h2>
        <p class="text-[#800000]">₹${p.price}</p>
      </div>
    `;
  });
  document.getElementById("product-list").innerHTML = html;
}
renderProducts();

/* FILTER */
function filterCategory(type){
  if(type==="all") filteredProducts = products;
  else filteredProducts = products.filter(p=>p.category.includes(type));
  renderProducts();
}

/* MODAL */
function openModal(id){
  selectedProduct = products.find(p=>p.id===id);
  document.getElementById("m-img").src = selectedProduct.image;
  document.getElementById("m-name").innerText = selectedProduct.name;
  document.getElementById("m-price").innerText = "₹"+selectedProduct.price;
  document.getElementById("m-desc").innerText = selectedProduct.desc;
  document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

/* CART */
function addFromModal(){
  let qty = parseInt(document.getElementById("m-qty").value);
  for(let i=0;i<qty;i++){ cart.push(selectedProduct); }
  document.getElementById("cart-count").innerText = cart.length;
  closeModal();
}

function viewCart(){
  document.getElementById("cart").classList.remove("hidden");
  let total=0, html="";
  cart.forEach((item,i)=>{
    total+=item.price;
    html+=`${item.name} ₹${item.price} <button onclick="removeItem(${i})">❌</button><br>`;
  });
  document.getElementById("cart-items").innerHTML=html;
  document.getElementById("total").innerText="Total ₹"+total;
}

function removeItem(i){
  cart.splice(i,1);
  document.getElementById("cart-count").innerText=cart.length;
  viewCart();
}

function closeCart(){
  document.getElementById("cart").classList.add("hidden");
}

/* WHATSAPP */
function orderNow(){
  let msg="Hello Scentzy Aromas,%0A I want:%0A", total=0;
  cart.forEach(i=>{
    msg+=`${i.name} ₹${i.price}%0A`;
    total+=i.price;
  });
  msg+=`Total ₹${total}`;
  window.open(`https://wa.me/${phoneNumber}?text=${msg}`);
}

function buyNowModal(){
  let qty=parseInt(document.getElementById("m-qty").value);
  let msg=`Hello Scentzy Aromas,%0A I want:%0A- ${selectedProduct.name} x${qty} (₹${selectedProduct.price*qty})`;
  window.open(`https://wa.me/${phoneNumber}?text=${msg}`);
}

</script>

</body>
</html>
