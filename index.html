<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scentzy Aromas</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="bg-[#800000] text-white p-4 flex justify-between items-center">
  <div class="flex items-center gap-2">
    <img src="logo.jpg" class="w-10 h-10 rounded-full">
    <h1 class="text-xl font-bold">Scentzy Aromas</h1>
  </div>

  <select onchange="filterCategory(this.value)" class="text-black px-2 py-1 rounded">
    <option value="all">All</option>
    <option value="men">Men</option>
    <option value="women">Women</option>
    <option value="attar">Attar</option>
    <option value="budget">Budget</option>
  </select>

  <button onclick="viewCart()" class="bg-white text-[#800000] px-3 py-1 rounded">
    Cart (<span id="cart-count">0</span>)
  </button>
</div>

<div id="product-list" class="grid grid-cols-2 gap-3 p-3"></div>

<!-- PRODUCT PAGE -->
<div id="product-page" class="hidden p-4">
  <button onclick="closeProduct()">⬅ Back</button>

  <img id="p-img" class="w-full h-60 object-contain">
  <h2 id="p-name" class="font-bold text-lg mt-2"></h2>
  <p id="p-price" class="text-[#800000] text-lg"></p>
  <p id="p-desc" class="text-sm text-gray-600 mt-2"></p>

  <input id="p-qty" type="number" value="1" min="1" class="border w-16 mt-2">

  <div class="flex gap-2 mt-3">
    <button onclick="addToCartPage()" class="bg-[#800000] text-white w-1/2 py-2 rounded">Add</button>
    <button onclick="buyNow()" class="bg-yellow-400 w-1/2 py-2 rounded">Buy</button>
  </div>
</div>

<!-- CART -->
<div id="cart-box" class="hidden fixed top-0 left-0 w-full h-full bg-black/60">
  <div class="bg-white m-4 p-4 rounded">
    <h2 class="font-bold">Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total"></h3>

    <button onclick="orderNow()" class="bg-green-500 text-white px-3 py-1 mt-2 rounded">Buy</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<script>

const phoneNumber = "919395739352";

let cart = [];
let selected = null;
let filtered = [];

/* FULL PRODUCTS (NO CHANGE NAMES) */
const products = [

{name:"RASASI HAWAS",price:2900,img:"hawas.jpg",cat:["men"],desc:"Fresh aquatic beast"},
{name:"AFNAN 9PM",price:2900,img:"9pm.jpg",cat:["men"],desc:"Sweet loud party fragrance"},
{name:"ARMAF CLUB DE NUIT INTENSE MAN PURE PARFUM",price:4200,img:"cdnpp.jpg",cat:["men"],desc:"Creed Aventus style beast"},
{name:"ARMAF BLUE HOMME",price:1899,img:"bluehomme.jpg",cat:["men"],desc:"Fresh daily wear"},
{name:"ARMAF ODYSSEY MEGA",price:2350,img:"armaf.jpg",cat:["men"],desc:"Creamy summer scent"},
{name:"AJMAL KURO",price:2399,img:"kuro.jpg",cat:["men"],desc:"Dior Sauvage clone"},
{name:"AFNAN 9PM ELIXIR",price:3199,img:"9pmelixir.jpg",cat:["men"],desc:"Stronger version of 9PM"},
{name:"AFNAN SUPREMACY NOT ONLY INTENSE",price:4199,img:"supremacy.jpg",cat:["men"],desc:"Beast mode projection"},
{name:"ARMAF TRES NUIT",price:1850,img:"tresnuit.jpg",cat:["men"],desc:"Green Irish Tweed vibe"},

{name:"LATTAFA YARA",price:2399,img:"yara.jpg",cat:["women"],desc:"Sweet creamy feminine"},
{name:"ARMAF TAG HER",price:2389,img:"tagher.jpg",cat:["women"],desc:"Elegant floral"},
{name:"AJMAL WISAL",price:2489,img:"wisal.jpg",cat:["women"],desc:"Rose dominant"},
{name:"LATTAFA ATHEERI",price:3399,img:"atheeri.jpg",cat:["women"],desc:"Luxury feminine scent"},

{name:"AFNAN MUSK ABIYAD",price:1399,img:"musk.jpg",cat:["attar"],desc:"Soft white musk"},
{name:"AJMAL JANNATUL FIRDAUS",price:699,img:"jannat.jpg",cat:["attar"],desc:"Classic attar"},
{name:"AL HARAMAIN MADINAH",price:899,img:"madinah.jpg",cat:["attar"],desc:"Spiritual fragrance"},

{name:"DELICIOUS DADDY",price:549,img:"delicious.jpg",cat:["budget"],desc:"Sweet addictive scent"},
{name:"PARADISE BABY",price:649,img:"paradise.jpg",cat:["budget"],desc:"Fresh tropical"},
{name:"FLORAL BABY",price:649,img:"floral.jpg",cat:["budget"],desc:"Spicy floral"},
{name:"OUT OF IMAGINATION",price:849,img:"imagination.jpg",cat:["budget"],desc:"Fresh tea fragrance"}

];

filtered = products;

/* RENDER */
function render(){
let html="";
filtered.forEach((p,i)=>{
html+=`
<div onclick="openProduct(${i})" class="bg-white p-2 rounded shadow text-center">
<img src="${p.img}" class="h-28 w-full object-contain">
<h3 class="text-sm">${p.name}</h3>
<p class="text-[#800000]">₹${p.price}</p>
</div>`;
});
document.getElementById("product-list").innerHTML=html;
}
render();

/* FILTER */
function filterCategory(c){
if(c=="all") filtered=products;
else filtered=products.filter(p=>p.cat.includes(c));
render();
}

/* PRODUCT */
function openProduct(i){
selected=filtered[i];

document.getElementById("product-list").style.display="none";
document.getElementById("product-page").style.display="block";

document.getElementById("p-img").src=selected.img;
document.getElementById("p-name").innerText=selected.name;
document.getElementById("p-price").innerText="₹"+selected.price;
document.getElementById("p-desc").innerText=selected.desc;
}

function closeProduct(){
document.getElementById("product-page").style.display="none";
document.getElementById("product-list").style.display="grid";
}

/* CART */
function addToCartPage(){
let qty=parseInt(document.getElementById("p-qty").value)||1;
for(let i=0;i<qty;i++) cart.push(selected);
document.getElementById("cart-count").innerText=cart.length;
}

function viewCart(){
document.getElementById("cart-box").style.display="block";

let html="",total=0;
cart.forEach(p=>{
html+=`${p.name} ₹${p.price}<br>`;
total+=p.price;
});

document.getElementById("cart-items").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

function closeCart(){
document.getElementById("cart-box").style.display="none";
}

/* WHATSAPP FIX */
function orderNow(){
let msg="🛒 *Scentzy Aromas Order*\\n\\n";
let total=0;

cart.forEach((p,i)=>{
msg+=(i+1)+". "+p.name+" - ₹"+p.price+"\\n";
total+=p.price;
});

msg+="\\nTotal: ₹"+total;

window.open("https://wa.me/"+phoneNumber+"?text="+encodeURIComponent(msg));
}

function buyNow(){
let qty=document.getElementById("p-qty").value;

let msg="🛍️ *Scentzy Aromas Order*\\n\\n"+
"Product: "+selected.name+"\\nQty: "+qty+"\\nPrice: ₹"+selected.price;

window.open("https://wa.me/"+phoneNumber+"?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
