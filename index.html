<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scentzy Aromas</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-900">

<nav class="bg-[#800000] text-white p-4 flex justify-between items-center flex-wrap">
  <div class="flex items-center gap-2">
    <img src="logo.jpg" class="w-10 h-10 rounded-full border-2 border-white">
    <h1 class="text-xl font-bold">Scentzy Aromas</h1>
  </div>

  <select onchange="filterCategory(this.value)" class="text-black px-2 py-1 rounded">
    <option value="all">All</option>
    <option value="men">Men</option>
    <option value="women">Women</option>
    <option value="attar">Attar</option>
    <option value="budget">Budget Perfumes</option>
  </select>

  <button onclick="viewCart()" class="bg-white text-[#800000] px-3 py-1 rounded">
    Cart (<span id="cart-count">0</span>)
  </button>
</nav>

<div id="product-list" class="grid grid-cols-2 gap-4 p-4"></div>

<div id="product-page" class="hidden p-4">
  <button onclick="closeProductPage()" class="mb-3 border px-3 py-1">⬅ Back</button>

  <img id="p-img" class="w-full h-60 object-contain">
  <h2 id="p-name" class="text-xl font-bold mt-2"></h2>
  <p id="p-price" class="text-[#800000] text-lg"></p>
  <p id="p-desc" class="mt-2 text-sm"></p>

  <label class="mt-2 block">Quantity:</label>
  <input id="p-qty" type="number" value="1" min="1" class="border w-16">

  <div class="mt-4 flex gap-2">
    <button onclick="addToCartPage()" class="bg-[#800000] text-white px-3 py-2 rounded w-1/2">
      Add to Cart
    </button>

    <button onclick="buyNowPage()" class="bg-yellow-400 px-3 py-2 rounded w-1/2">
      Buy Now
    </button>
  </div>
</div>

<div id="cart" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-60">
  <div class="bg-white p-4 m-4 rounded">
    <h2 class="text-xl font-bold mb-2">Your Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total"></h3>

    <button onclick="orderNow()" class="bg-green-500 text-white px-3 py-1 mt-3 rounded">
      Buy Now (WhatsApp)
    </button>

    <button onclick="closeCart()" class="ml-2 border px-3 py-1 mt-3">
      Close
    </button>
  </div>
</div>

<script>

const phoneNumber = "919395739352";

let cart = [];
let filteredProducts = [];
let selectedProduct = null;

const products = [

/* MEN + UNISEX */
{id:1,name:"RASASI HAWAS",price:2900,image:"hawas.jpg",category:["men"],desc:"Fresh aquatic fragrance"},
{id:2,name:"AFNAN 9PM",price:2900,image:"9pm.jpg",category:["men"],desc:"Sweet party fragrance"},
{id:3,name:"ARMAF CLUB DE NUIT INTENSE MAN PURE PARFUM",price:4200,image:"cdnpp.jpg",category:["men"],desc:"Smoky beast fragrance"},
{id:4,name:"ARMAF ODYSSEY MEGA",price:2350,image:"odyssey.jpg",category:["men"],desc:"Fresh citrus scent"},
{id:5,name:"AFNAN 9PM ELIXIR",price:3199,image:"9pme.jpg",category:["men"],desc:"Deep sweet version"},

{id:6,name:"LATTAFA NAJDIA (UNISEX)",price:1699,image:"najdia.jpg",category:["men","women"],desc:"Fresh unisex fragrance"},
{id:7,name:"AHMED AL MAGHRIBI BIN SHAIKH",price:5200,image:"binshaikh.jpg",category:["men","women"],desc:"Luxury oud"},
{id:8,name:"AHMED AL MAGHRIBI OUD & ROSES (UNISEX)",price:3699,image:"oudroses.jpg",category:["men","women"],desc:"Rose oud blend"},

{id:9,name:"AHMED AL MAGHRIBI KAAF",price:2299,image:"kaaf.jpg",category:["men"],desc:"Aquatic scent"},
{id:10,name:"FRAGRANCE WORLD AQUA PURA 50ML",price:850,image:"aquapura.jpg",category:["men"],desc:"Budget fresh"},
{id:11,name:"AJMAL KURO",price:2399,image:"kuro.jpg",category:["men"],desc:"Spicy masculine"},
{id:12,name:"ARMAF TRES NUIT",price:1850,image:"tresnuit.jpg",category:["men"],desc:"Green fresh"},
{id:13,name:"ARMAF BLUE HOMME",price:1899,image:"bluehomme.jpg",category:["men"],desc:"Clean citrus"},
{id:14,name:"ARMAF CLUB DE NUIT PRECIEUX 1 EXTRAIT DE PARFUM 55ML",price:4499,image:"precieux.jpg",category:["men"],desc:"Luxury scent"},
{id:15,name:"KHADLAJ ISLAND DREAMS EDP 100ML",price:2399,image:"islanddreams.jpg",category:["men","women"],desc:"Tropical scent"},
{id:16,name:"AFNAN SUPREMACY NOT ONLY INTENSE EDP 150ML",price:4199,image:"supremacynoi.jpg",category:["men"],desc:"Beast mode"},
{id:17,name:"AFNAN SUPREMACY COLLECTOR EDITION EDP",price:4100,image:"supremacycollector.jpg",category:["men"],desc:"Premium scent"},
{id:18,name:"OUD AL LAYL MIDNIGHT EDITION",price:1499,image:"oudallayl.jpg",category:["men"],desc:"Dark oud"},

/* WOMEN */
{id:19,name:"LATTAFA YARA ELIXIR EDP",price:2399,image:"yara.jpg",category:["women"],desc:"Sweet feminine"},
{id:20,name:"LATTAFA NAJDIA (UNISEX)",price:1699,image:"najdia.jpg",category:["women"],desc:"Fresh unisex"},
{id:21,name:"KHADLAJ ISLAND DREAMS EDP 100ML (UNISEX)",price:2450,image:"islanddreams.jpg",category:["women"],desc:"Floral tropical"},
{id:22,name:"FRAGRANCE WORLD ELYSIA LYCHEE FIZZ EDP 50ML",price:799,image:"elysia.jpg",category:["women"],desc:"Fruity scent"},
{id:23,name:"MAISON ALHAMBRA KISMET MAGIC EDP (UNISEX)",price:2499,image:"kismet.jpg",category:["women"],desc:"Warm sweet"},
{id:24,name:"AJMAL RAINDROPS 50ML EDP",price:1499,image:"raindrops.jpg",category:["women"],desc:"Floral fresh"},
{id:25,name:"AJMAL WISAL 50ML EDP",price:2489,image:"wisal.jpg",category:["women"],desc:"Elegant floral"},
{id:26,name:"ARMAF TAG HER 100ML EDP",price:2389,image:"tagher.jpg",category:["women"],desc:"Sweet fragrance"},
{id:27,name:"ARMAF TRES JOUR 100ML EDP",price:2389,image:"tresjour.jpg",category:["women"],desc:"Clean floral"},
{id:28,name:"LATTAFA ATHEERI 100ML EDP",price:3399,image:"atheeri.jpg",category:["women"],desc:"Luxury floral"},
{id:29,name:"RASASI SHUHRAH POUR FEMME 100ML EDP",price:2699,image:"shuhrah.jpg",category:["women"],desc:"Bold feminine"},

/* ATTAR */
{id:30,name:"AFNAN MUSK ABIYAD 20ML ATTAR",price:1399,image:"musk.jpg",category:["attar"],desc:"White musk"},
{id:31,name:"AJMAL JANNATUL FIRDAUS 10ML ATTAR",price:699,image:"jannat.jpg",category:["attar"],desc:"Green attar"},
{id:32,name:"AL HARAMAIN MADINAH 15ML ATTAR",price:899,image:"madinah.jpg",category:["attar"],desc:"Soft floral"},
{id:33,name:"ZIMAYA SHARAF 20ML ATTAR",price:1850,image:"sharaf.jpg",category:["attar"],desc:"Rich oriental"},

/* BUDGET */
{id:34,name:"DELICIOUS DADDY",price:549,image:"delicious.jpg",category:["budget"],desc:"Sweet seductive"},
{id:35,name:"PARADISE BABY",price:649,image:"paradise.jpg",category:["budget"],desc:"Mint coconut"},
{id:36,name:"FLORAL BABY",price:649,image:"floral.jpg",category:["budget"],desc:"Spicy floral"},
{id:37,name:"OUT OF IMAGINATION",price:849,image:"imagination.jpg",category:["budget"],desc:"Fresh citrus"}

];

filteredProducts = products;

function renderProducts(){
let html="";
filteredProducts.forEach(p=>{
html+=`
<div onclick="openProductPage(${p.id})" class="border p-2 rounded text-center cursor-pointer">
<img src="${p.image}" class="h-32 w-full object-contain mb-2">
<h2>${p.name}</h2>
<p>₹${p.price}</p>
</div>`;
});
document.getElementById("product-list").innerHTML=html;
}
renderProducts();

function filterCategory(type){
if(type==="all") filteredProducts=products;
else filteredProducts=products.filter(p=>p.category.includes(type));
renderProducts();
}

function openProductPage(id){
selectedProduct=products.find(p=>p.id===id);
document.getElementById("product-list").style.display="none";
document.getElementById("product-page").style.display="block";
document.getElementById("p-img").src=selectedProduct.image;
document.getElementById("p-name").innerText=selectedProduct.name;
document.getElementById("p-price").innerText="₹"+selectedProduct.price;
document.getElementById("p-desc").innerText=selectedProduct.desc;
}

function closeProductPage(){
document.getElementById("product-page").style.display="none";
document.getElementById("product-list").style.display="grid";
}

function addToCartPage(){
let qty=parseInt(document.getElementById("p-qty").value)||1;
for(let i=0;i<qty;i++) cart.push(selectedProduct);
document.getElementById("cart-count").innerText=cart.length;
}

function viewCart(){
document.getElementById("cart").style.display="block";
let html="",total=0;
cart.forEach((item,i)=>{
html+=`${i+1}. ${item.name} - ₹${item.price}<br>`;
total+=item.price;
});
document.getElementById("cart-items").innerHTML=html;
document.getElementById("total").innerText="Total: ₹"+total;
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

function buyNowPage(){
let qty=document.getElementById("p-qty").value||1;
let msg=`🛍️ *Scentzy Aromas Order*

📦 Product: ${selectedProduct.name}
🔢 Quantity: ${qty}
💰 Price: ₹${selectedProduct.price}

✨ Please confirm availability`;
window.open("https://wa.me/"+phoneNumber+"?text="+encodeURIComponent(msg));
}

function orderNow(){
let msg="🛒 *Scentzy Aromas Cart Order*\n\n";
let total=0;
cart.forEach((item,i)=>{
msg+=`${i+1}. ${item.name} - ₹${item.price}\n`;
total+=item.price;
});
msg+=`\n━━━━━━━━━━━━━━━\n💰 Total: ₹${total}\n\n✨ Please confirm order`;
window.open("https://wa.me/"+phoneNumber+"?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
