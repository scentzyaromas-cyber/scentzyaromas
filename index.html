<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scentzy Aromas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-900">

<!-- Navbar -->
<nav class="bg-[#800000] text-white p-4 flex justify-between items-center">
  <h1 class="text-2xl font-bold">Scentzy Aromas</h1>

  <input id="search" onkeyup="searchProducts()" placeholder="Search perfume..."
    class="text-black px-3 py-1 rounded w-1/2" />

  <button onclick="viewCart()" class="bg-white text-[#800000] px-3 py-1 rounded">
    Cart (<span id="cart-count">0</span>)
  </button>
</nav>

<!-- Products -->
<div id="product-list" class="grid grid-cols-2 gap-6 p-6"></div>

<!-- Product Modal -->
<div id="productModal" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-60">
  <div class="bg-white p-6 m-6 rounded-xl">
    
    <img id="modal-img" class="w-full h-48 object-contain" />
    <h2 id="modal-name" class="text-xl font-bold mt-2"></h2>
    <p id="modal-price" class="text-[#800000]"></p>
    <p id="modal-desc" class="mt-2 text-sm"></p>

    <label class="block mt-3">Quantity:</label>
    <input id="qty" type="number" value="1" min="1" class="border p-1 w-20" />

    <button onclick="addToCartFromModal()" class="bg-[#800000] text-white px-3 py-1 mt-3 rounded">
      Add to Cart
    </button>

    <button onclick="buyNow()" class="bg-green-500 text-white px-3 py-1 mt-3 rounded ml-2">
      Buy Now
    </button>

    <button onclick="closeModal()" class="ml-2 px-3 py-1 border">Close</button>

  </div>
</div>

<!-- Cart -->
<div id="cart" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-60">
  <div class="bg-white p-6 m-6 rounded-xl">

    <h2 class="text-xl font-bold mb-4">Your Cart</h2>
    <div id="cart-items"></div>

    <h3 id="total" class="mt-4 text-[#800000]"></h3>

    <button onclick="orderNow()" class="bg-green-500 text-white px-4 py-2 mt-4 rounded">
      Order on WhatsApp
    </button>

    <button onclick="closeCart()" class="ml-2 px-4 py-2 border">
      Close
    </button>

  </div>
</div>

<script>

const phoneNumber = "919395739352";

let selectedProduct = null;
let cart = [];

const products = [
  { id:1, name:"Rasasi Hawas", price:2900, image:"hawas.jpg", desc:"Fresh aquatic long lasting fragrance" },
  { id:2, name:"Afnan 9PM", price:2900, image:"9pm.jpg", desc:"Sweet night party fragrance" },
  { id:3, name:"Tres Nuit Pour Homme", price:1850, image:"tresnuit.jpg", desc:"Green fresh classy scent" },
  { id:4, name:"Armaf Blue Homme", price:1899, image:"armaf.jpg", desc:"Fresh everyday fragrance" },
  { id:5, name:"Armaf Club De Nuit Intense Man (150ml)", price:4200, image:"cdnintense.jpg", desc:"Strong smoky citrus beast" },
  { id:6, name:"Ahmed Al Maghribi Kaaf", price:2150, image:"kaaf.jpg", desc:"Clean fresh aquatic vibe" },
  { id:7, name:"Ahmed Al Maghribi Oud & Roses", price:3699, image:"oudroses.jpg", desc:"Sweet floral oud combo" },
  { id:8, name:"Armaf Club De Nuit Precieux", price:4399, image:"precieux.jpg", desc:"Premium luxury fragrance" },
  { id:9, name:"Armaf Odyssey Mega", price:2350, image:"odyssey.jpg", desc:"Fresh citrus everyday scent" }
];

let filteredProducts = products;

/* ---------- PRODUCTS ---------- */
function renderProducts(){
  const list = document.getElementById("product-list");
  list.innerHTML = "";

  filteredProducts.forEach(p => {
    list.innerHTML += `
      <div onclick="openModal(${p.id})"
        class="bg-white border rounded-xl shadow cursor-pointer hover:shadow-lg transition">

        <img src="${p.image}" class="w-full h-48 object-contain" />

        <div class="p-3">
          <h2 class="text-md font-semibold">${p.name}</h2>
          <p class="text-[#800000] font-bold">₹${p.price}</p>
        </div>
      </div>
    `;
  });
}

renderProducts();

/* ---------- SEARCH ---------- */
function searchProducts(){
  const query = document.getElementById("search").value.toLowerCase();
  filteredProducts = products.filter(p =>
    p.name.toLowerCase().includes(query)
  );
  renderProducts();
}

/* ---------- MODAL ---------- */
function openModal(id){
  const p = products.find(x => x.id === id);
  selectedProduct = p;

  document.getElementById("modal-img").src = p.image;
  document.getElementById("modal-name").innerText = p.name;
  document.getElementById("modal-price").innerText = "₹" + p.price;
  document.getElementById("modal-desc").innerText = p.desc;

  document.getElementById("productModal").classList.remove("hidden");
}

function closeModal(){
  document.getElementById("productModal").classList.add("hidden");
}

/* ---------- CART ADD (FIXED) ---------- */
function addToCartFromModal(){
  const qty = parseInt(document.getElementById("qty").value);

  let existing = cart.find(item => item.id === selectedProduct.id);

  if(existing){
    existing.qty += qty;
  } else {
    cart.push({ ...selectedProduct, qty });
  }

  updateCartCount();
  closeModal();
}

/* ---------- CART COUNT ---------- */
function updateCartCount(){
  let count = 0;
  cart.forEach(item => count += item.qty);
  document.getElementById("cart-count").innerText = count;
}

/* ---------- VIEW CART (UPDATED) ---------- */
function viewCart(){
  document.getElementById("cart").classList.remove("hidden");

  const cartItems = document.getElementById("cart-items");
  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    total += item.price * item.qty;

    cartItems.innerHTML += `
      <div class="border p-2 mb-2 rounded">
        <b>${item.name}</b><br>

        ₹${item.price} x ${item.qty} = ₹${item.price * item.qty}

        <div class="mt-2">
          <button onclick="changeQty(${index},1)"
            class="px-2 bg-green-500 text-white">+</button>

          <button onclick="changeQty(${index},-1)"
            class="px-2 bg-yellow-500 text-white">-</button>

          <button onclick="removeItem(${index})"
            class="px-2 bg-red-500 text-white">Remove</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

/* ---------- CART ACTIONS ---------- */
function changeQty(index,val){
  cart[index].qty += val;

  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }

  updateCartCount();
  viewCart();
}

function removeItem(index){
  cart.splice(index,1);
  updateCartCount();
  viewCart();
}

function closeCart(){
  document.getElementById("cart").classList.add("hidden");
}

/* ---------- WHATSAPP ORDER ---------- */
function orderNow(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  let message = "Hello Scentzy Aromas,%0A I want to order:%0A";
  let total = 0;

  cart.forEach(item => {
    message += `- ${item.name} x${item.qty} (₹${item.price * item.qty})%0A`;
    total += item.price * item.qty;
  });

  message += `%0ATotal: ₹${total}%0A%0AName:%0AAddress:%0A`;

  window.open(`https://wa.me/${phoneNumber}?text=${message}`, "_blank");
}

/* ---------- BUY NOW ---------- */
function buyNow(){
  const qty = parseInt(document.getElementById("qty").value);

  let msg = `Hello Scentzy Aromas,%0AI want:${selectedProduct.name} x${qty}%0A₹${selectedProduct.price}`;

  window.open(`https://wa.me/${phoneNumber}?text=${msg}`, "_blank");
}

</script>

</body>
</html>
